<!DOCTYPE html>
<html>
<head>
<title>Products</title>
<style>
body{font-family:Arial;background:#f4f8fb;text-align:center}
.product{background:white;margin:15px auto;padding:15px;max-width:400px;border-radius:12px;box-shadow:0 2px 8px #ccc}
button{background:green;color:white;border:none;padding:10px 18px;border-radius:8px}
</style>
</head>
<body>

<h1>Products</h1>
<div id="productList"></div>

<a href="index.html">Back to Home</a>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyCU7bPTGq5dCKAIk78gayctHGIuK8AFNeg",
  authDomain: "mahidpur-online-delivery.firebaseapp.com",
  databaseURL: "https://mahidpur-online-delivery-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "mahidpur-online-delivery",
  storageBucket: "mahidpur-online-delivery.firebasestorage.app",
  messagingSenderId: "960646763964",
  appId: "1:960646763964:web:ce44055c7a772e046007b9"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

const productList = document.getElementById("productList");

window.addToCart = function(name, price){
  localStorage.setItem("cartName", name);
  localStorage.setItem("cartPrice", price);
  window.location.href = "cart.html";
}

onValue(ref(db, "products"), (snapshot) => {
  productList.innerHTML = "";

  if (!snapshot.exists()) {
    productList.innerHTML = "<p>No products available.</p>";
    return;
  }

  snapshot.forEach((child) => {
    const p = child.val();

    productList.innerHTML += `
      <div class="product">
        <h2>${p.name}</h2>
        <p>Shop: ${p.shop}</p>
        <p>₹${p.price}</p>
        <p>${p.category}</p>
        <button onclick="window.addToCart('${p.name}', '${p.price}')">Add to Cart</button>
      </div>
    `;
  });
});
</script>

</body>
</html>
