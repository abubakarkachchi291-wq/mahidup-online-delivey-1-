<!DOCTYPE html>
<html>
<head>
<title>Shop Dashboard</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
body{font-family:Arial;background:#f4f8fb;text-align:center}
.box{
background:white;
max-width:500px;
margin:20px auto;
padding:20px;
border-radius:12px;
box-shadow:0 2px 8px #ccc;
}
input{
width:90%;
padding:10px;
margin:10px;
}
button{
background:green;
color:white;
border:none;
padding:12px 20px;
border-radius:8px;
}
</style>
</head>
<body>

<div class="box">
<h1>Shop Owner Dashboard</h1>

<h2>Add Product</h2>

<input type="text" placeholder="Product Name">
<input type="number" placeholder="Price">

<button>Add Product</button>

<h2>Your Products</h2>

<p>Rice - ₹300</p>
<p>Cooking Oil - ₹140</p>

<a href="index.html">
<button>Back to Home</button>
</a>

</div>

</body>
</html>
