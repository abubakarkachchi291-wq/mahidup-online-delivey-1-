<!DOCTYPE html>
<html>
<head>
<title>Shop Registration</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
body{font-family:Arial;margin:0;background:#f4f8fb;text-align:center}
header{background:#0ea5e9;color:white;padding:25px}
.box{background:white;margin:20px auto;padding:20px;max-width:420px;border-radius:12px;box-shadow:0 2px 8px #ccc}
input,textarea,select{width:90%;padding:12px;margin:8px;border:1px solid #ccc;border-radius:8px}
button{background:green;color:white;border:none;padding:12px 20px;border-radius:8px;font-size:16px}
</style>
</head>
<body>

<header>
<h1>Register Your Shop</h1>
<p>Mahidpur Online Delivery</p>
</header>

<div class="box">
<input type="text" placeholder="Shop Name">
<input type="text" placeholder="Owner Name">
<input type="tel" placeholder="Mobile Number">
<textarea placeholder="Shop Address"></textarea>

<select>
<option>Select Category</option>
<option>Grocery</option>
<option>Medical Store</option>
<option>Restaurant</option>
<option>Stationery</option>
<option>Clothing</option>
<option>Electronics</option>
</select>

<button onclick="alert('Shop registration submitted!')">Submit</button>
<br><br>
<a href="index.html">Back to Home</a>
</div>

</body>
</html>
