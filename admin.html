<!DOCTYPE html>
<html>
<head>
<title>Admin Panel</title>
<style>
body{
  font-family:Arial;
  background:#f4f8fb;
  text-align:center;
}

.card{
  background:white;
  margin:15px auto;
  padding:15px;
  max-width:500px;
  border-radius:12px;
  box-shadow:0 2px 8px #ccc;
}

button{
  background:red;
  color:white;
  border:none;
  padding:10px 15px;
  border-radius:8px;
  cursor:pointer;
}
</style>
</head>
<body>

<h1>Admin Panel</h1>
<h2>All Products</h2>

<div id="adminProducts"></div>

<a href="index.html">Back to Home</a>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
  getDatabase,
  ref,
  onValue,
  remove
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyCU7bPTGq5dCKAIk78gayctHGIuK8AFNeg",
  authDomain: "mahidpur-online-delivery.firebaseapp.com",
  databaseURL: "https://mahidpur-online-delivery-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "mahidpur-online-delivery",
  storageBucket: "mahidpur-online-delivery.firebasestorage.app",
  messagingSenderId: "960646763964",
  appId: "1:960646763964:web:ce44055c7a772e046007b9"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

const adminProducts = document.getElementById("adminProducts");

onValue(ref(db, "products"), (snapshot) => {

  adminProducts.innerHTML = "";

  if(!snapshot.exists()){
    adminProducts.innerHTML =
    "<h3>No Products Found</h3>";
    return;
  }

  snapshot.forEach((child) => {

    const p = child.val();
    const id = child.key;

    adminProducts.innerHTML += `
      <div class="card">
        <h3>${p.name}</h3>
        <p><b>Shop:</b> ${p.shop}</p>
        <p><b>Price:</b> ₹${p.price}</p>
        <p><b>Category:</b> ${p.category}</p>

        <button onclick="deleteProduct('${id}')">
          Delete Product
        </button>
      </div>
    `;
  });
});

window.deleteProduct = function(id){

  if(confirm("Delete this product?")){

    remove(ref(db,"products/"+id));

    alert("Product Deleted Successfully");
  }
}

</script>

</body>
</html>
