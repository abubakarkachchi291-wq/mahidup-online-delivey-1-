<!DOCTYPE html>
<html>
<head>
<title>Customer Login</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
body{
font-family:Arial;
background:#f4f8fb;
text-align:center;
padding:30px;
}

.box{
background:white;
max-width:400px;
margin:auto;
padding:20px;
border-radius:12px;
box-shadow:0 2px 8px #ccc;
}

input{
width:90%;
padding:10px;
margin:10px;
}

button{
background:green;
color:white;
border:none;
padding:12px 20px;
border-radius:8px;
}
</style>
</head>
<body>

<div class="box">
<h1>Customer Login</h1>

<input type="text" placeholder="Mobile Number">
<br>

<input type="password" placeholder="Password">
<br>

<button>Login</button>

<br><br>

<a href="index.html">Back to Home</a>
</div>

</body>
</html>
